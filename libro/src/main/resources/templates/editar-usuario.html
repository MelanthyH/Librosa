<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librosa — Usuario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Cinzel&family=Lato&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/editar-usuario.css}">
</head>

<body>
<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="/admin/dashboard">
      Lib<span>rosa</span>
    </a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container">

    <h1>
      <span th:if="${usuario.id == 0}">
        Crear <em style="color: var(--rojo);">usuario</em>
      </span>
      <span th:if="${usuario.id != 0}">
        Editar <em style="color: var(--rojo);">usuario</em>
      </span>
    </h1>

    <div class="row justify-content-center mt-4">
      <div class="col-lg-6">

        <div class="form-card">

          <form th:action="@{/usuarios/guardar}"
                th:object="${usuario}"
                method="post">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
              <label>Nombre</label>
              <input type="text"
                     th:field="*{nombre}"
                     class="form-control"
                     required>
            </div>

            <div class="mb-3">
              <label>Correo</label>
              <input type="email"
                     th:field="*{correo}"
                     class="form-control"
                     required>
            </div>

            <div class="mb-3">
              <label>Contraseña</label>
              <input type="password"
                     th:field="*{contraseña}"
                     class="form-control"
                     placeholder="Nueva contraseña (opcional)">
            </div>

            <div class="mb-4">
              <label>Tipo de usuario</label>
              <select th:field="*{tipoUsuario}" class="form-select">
                <option value="usuario">Usuario</option>
                <option value="admin">Administrador</option>
              </select>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn-primary-lib">
                <span th:if="${usuario.id == 0}">Crear</span>
                <span th:if="${usuario.id != 0}">Guardar</span>
              </button>

              <a href="/admin/dashboard" class="btn-secondary-lib">
                Cancelar
              </a>
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container text-center">
    <p>© 2026 Librosa</p>
  </div>
</footer>

</body>
</html>
