<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Librosa — Mi Perfil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" th:href="@{/css/perfil.css}" />
</head>

<body>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">Lib<span>rosa</span></a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-center gap-3">

          <li class="nav-item">
            <a class="nav-link" href="/mi-biblioteca">Mi Biblioteca</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" th:href="@{/usuarios/perfil}" style="color: var(--blanco) !important;">
              Mi Perfil
            </a>
          </li>

          <li class="nav-item">
            <span class="nav-user">
              Hola, <span th:text="${session.usuario.nombre}"></span>
            </span>
          </li>

          <li class="nav-item">
            <a href="/usuarios/logout" class="nav-link" style="color: var(--rojo) !important;">
              Cerrar sesión
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">

      <div class="breadcrumb-lib">
        <a href="/mi-biblioteca">Mi Biblioteca</a>
        <span>›</span>
        <span>Mi Perfil</span>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="page-title">
            Mi <em>perfil</em>
          </h1>
        </div>

        <span class="modo-badge" id="modoBadge">
          Solo lectura
        </span>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="form-card">

            <form th:action="@{/usuarios/actualizar}" method="post" id="perfilForm">
              <input type="hidden" name="id" th:value="${session.usuario.id}"/>
              <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" th:value="${session.usuario.nombre}"
                  disabled />
              </div>

              <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="email" name="correo" class="form-control" th:value="${session.usuario.correo}"
                  disabled />
              </div>

              <div class="mb-4">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" id="contraseña" name="contraseña" class="form-control"
                  placeholder="Nueva contraseña" disabled />
              </div>

              <div id="botonesVista">
                <button type="button" class="btn-primary-lib" onclick="activarEdicion()">
                  Editar perfil
                </button>
              </div>

              <div id="botonesEdicion" class="d-none">
                <button type="submit" class="btn-primary-lib">
                  Guardar cambios
                </button>

                <button type="button" class="btn-secondary-lib" onclick="cancelarEdicion()">
                  Cancelar
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="container d-flex justify-content-between align-items-center">
      <p class="footer-logo">
        Lib<span>rosa</span>
      </p>

      <p>
        © 2026 Librosa — IF4101 Lenguajes para Aplicaciones Comerciales · UCR
      </p>
    </div>
  </footer>

  <script>
    const camposEditables = [
      'nombre',
      'email',
      'contraseña'
    ];

    function activarEdicion() {
      camposEditables.forEach(id => {
        document.getElementById(id).disabled = false;
      });

      document.getElementById("botonesVista").classList.add("d-none");
      document.getElementById("botonesEdicion").classList.remove("d-none");

      document.getElementById("modoBadge").textContent = "Modo edición";
    }

    function cancelarEdicion() {
      camposEditables.forEach(id => {
        document.getElementById(id).disabled = true;
      });

      document.getElementById("contraseña").value = "";

      document.getElementById("botonesVista").classList.remove("d-none");
      document.getElementById("botonesEdicion").classList.add("d-none");

      document.getElementById("modoBadge").textContent = "Solo lectura";
    }
  </script>

</body>

</html>
