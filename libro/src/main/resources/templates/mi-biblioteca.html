<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Librosa — Mi Biblioteca</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" th:href="@{/css/mi-biblioteca.css}" />
</head>

<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" th:href="@{/}">
        Lib<span>rosa</span>
      </a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/usuarios/perfil}">
              Mi Perfil
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/dashboard}">
              ← Mi Panel
            </a>
          </li>
          <li class="nav-item">
            <a th:href="@{/usuarios/login}" class="btn-nav-outline">
              Cerrar sesión
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="page-title">Mi <em>Biblioteca</em></h1>
    </div>
  </div>

  <div class="container">
    <div class="filtros">

      <div></div>

      <a th:href="@{/biblioteca-general}" style="text-decoration:none;">
        <button type="button" class="btn-agregar">
          + Agregar libro
        </button>
      </a>

    </div>
  </div>

  <section class="biblioteca">
    <div class="container">

      <div class="row g-4" th:if="${not #lists.isEmpty(todos)}">

        <div class="col-md-4 col-lg-3" th:each="registro : ${todos}">

          <div class="book-card">

            <img th:if="${registro.libro.portadaUrl != null}" th:src="${registro.libro.portadaUrl}"
              style="width:100%; height:200px; object-fit:cover;" />
            <div th:if="${registro.libro.portadaUrl == null}" class="book-cover-placeholder">📖</div>

            <div class="book-body">

              <span class="estado-badge" th:classappend="
                  ${registro.estado == 'leído'} ? ' estado-leido' :
                  (${registro.estado == 'leyendo'} ? ' estado-leyendo' :
                  ' estado-pendiente')" th:text="${registro.estado}">
              </span>

              <h3 class="book-title" th:text="${registro.libro.titulo}">
              </h3>

              <p class="book-author" th:text="${registro.libro.autor}">
              </p>

              <p th:text="${registro.libro.categoria.nombreCategoria}">
              </p>

              <p>
                Página actual:
                <span th:text="${registro.paginaActual}"></span>
              </p>

            </div>

            <div class="book-actions">

              <form th:action="@{/mi-biblioteca/{id}/editar(id=${registro.id})}" method="get" style="flex:1;">

                <button type="submit" class="btn-accion">
                  Editar
                </button>
              </form>

              <form th:action="@{/mi-biblioteca/{id}/eliminar(id=${registro.id})}" method="post" style="flex:1;">

                <button type="submit" class="btn-accion danger">
                  Eliminar
                </button>
              </form>

            </div>

          </div>
        </div>

      </div>

      <div class="empty-state" th:if="${#lists.isEmpty(todos)}">

        <h3>Tu biblioteca está vacía</h3>
        <p>Agrega tu primer libro para comenzar</p>

        <a th:href="@{/biblioteca-general}" style="text-decoration:none;">
          <button type="button" class="btn-agregar">
            + Agregar libro
          </button>
        </a>

      </div>

    </div>
  </section>

  <footer>
    <div class="container text-center">
      <p>Librosa © 2026</p>
    </div>
  </footer>

</body>
