<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Confirmar libro — Librosa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/confirmar-sugerencia.css}" />
</head>

<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">Lib<span>rosa</span></a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" th:href="@{/usuarios/perfil}">Mi Perfil</a>
        <a class="nav-link" th:href="@{/mi-biblioteca}">Mi Biblioteca</a>
        <a class="nav-link" th:href="@{/biblioteca-general}">General</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card-lib" style="max-width:500px; margin:auto;">

      <h2 style="font-family:'Cormorant Garamond',serif; font-size:2rem;">
        Agregar a <em style="color:var(--rojo);">mi biblioteca</em>
      </h2>

      <img th:if="${portada != null}" th:src="${portada}"
        style="width:100%; max-height:200px; object-fit:cover; margin:1rem 0;" />

      <p style="font-size:1.1rem; margin-top:1rem;" th:text="${titulo}"></p>
      <p style="color:var(--gris); font-size:0.85rem;" th:text="${autor}"></p>

      <form th:action="@{/sugerencias-externas/guardar}" method="post" class="mt-3">
        <input type="hidden" name="titulo" th:value="${titulo}" />
        <input type="hidden" name="autor" th:value="${autor}" />
        <input type="hidden" name="portada" th:value="${portada}" />

        <div class="mb-3">
          <label style="font-family:'Cinzel',serif; font-size:0.7rem; color:var(--gris);">
            CATEGORÍA
          </label>
          <select name="categoriaId" class="form-select" required>
            <option value="">Seleccioná una categoría</option>
            <option th:each="c : ${categorias}" th:value="${c.getId()}" th:text="${c.getNombreCategoria()}">
            </option>
          </select>
        </div>

        <button type="submit" style="font-family:'Cinzel',serif; font-size:0.65rem;
                     padding:0.5rem 1.5rem; background:var(--rojo);
                     color:var(--blanco); border:none; cursor:pointer; width:100%;">
          CONFIRMAR Y AGREGAR
        </button>
      </form>

      <a th:href="@{/biblioteca-general}" style="display:block; text-align:center; margin-top:1rem;
              font-family:'Cinzel',serif; font-size:0.65rem;
              color:var(--gris); text-decoration:none;">
        ← Cancelar
      </a>
    </div>
  </div>
</body>

</html>
