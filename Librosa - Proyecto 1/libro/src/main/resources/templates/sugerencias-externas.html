<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Librosa — Sugerencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/sugerencias-externas.css}" />
</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Lib<span>rosa</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/usuarios/perfil}">Mi Perfil</a>
                <a class="nav-link" th:href="@{/mi-biblioteca}">Mi Biblioteca</a>
                <a class="nav-link" th:href="@{/biblioteca-general}">General</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 style="font-family:'Cormorant Garamond',serif; font-size:2.2rem;">
            Resultados para: <em style="color:var(--rojo);" th:text="${tema}"></em>
        </h1>

        <p th:if="${error}" th:text="${error}" style="color:var(--rojo);"></p>

        <div class="row g-3 mt-2">
            <div class="col-md-4 col-lg-2" th:each="libro : ${sugerencias}">
                <div class="book-card">
                    <img th:if="${libro.portada != null}" th:src="${libro.portada}" alt="portada"
                        style="width:100%; height:140px; object-fit:cover; margin-bottom:0.5rem;" />
                    <div th:if="${libro.portada == null}" style="width:100%; height:140px; background:#1a1a1a;
                    display:flex; align-items:center; justify-content:center;
                    color:var(--gris); font-size:0.7rem; margin-bottom:0.5rem;">
                        Sin portada
                    </div>
                    <h3 class="book-title" th:text="${libro.titulo}"></h3>
                    <p class="book-author" th:text="${libro.autor}"></p>

                    <!-- BOTÓN AGREGAR -->
                    <a th:href="@{/sugerencias-externas/confirmar(titulo=${libro.titulo}, autor=${libro.autor}, portada=${libro.portada})}"
                        style="display:block; margin-top:0.5rem; text-align:center;
                  font-family:'Cinzel',serif; font-size:0.6rem; padding:0.3rem;
                  border:1px solid var(--rojo); color:var(--rojo); text-decoration:none;">
                        + Agregar a mi biblioteca
                    </a>
                </div>
            </div>
        </div>

        <div class="text-center mt-5" th:if="${#lists.isEmpty(sugerencias)}">
            <h3 style="color:var(--gris); font-family:'Cormorant Garamond';">
                No se encontraron resultados.
            </h3>
        </div>

        <a th:href="@{/biblioteca-general}" style="font-family:'Cinzel',serif; font-size:0.65rem; color:var(--gris);
            text-decoration:none; display:inline-block; margin-top:2rem;">
            ← Volver a Biblioteca General
        </a>
    </div>
</body>

</html>
