<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Librosa — Crear cuenta</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/css/register.css" />
</head>

<body>
  <nav class="navbar sticky-top">
    <div class="container d-flex align-items-center">
      <a class="navbar-brand" href="/">
        <img th:src="@{/img/logo_sin_fondo.png}" alt="Librosa" style="height:45px; width:auto; margin-right:0.5rem;" />
        Lib<span>rosa</span>
      </a>
      <a href="/" style="font-family:'Cinzel',serif; font-size:0.65rem;
                       color:var(--gris); text-decoration:none; margin-left:auto;
                       letter-spacing:0.1em;">
        ← Volver al inicio
      </a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="register-card">

      <p class="card-label">Bienvenida a Librosa</p>
      <h1 class="card-title">Crea tu <em>cuenta</em></h1>
      <p class="card-subtitle">Empieza a organizar tu biblioteca personal hoy.</p>

      <hr class="form-divider" />

      <form action="/usuarios/registrar" method="post" id="registerForm">

        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ana García" required />
        </div>

        <div class="mb-3">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="correo" name="correo" placeholder="ana@correo.com" required />
        </div>

        <div class="mb-3">
          <label for="contraseña" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="contraseña" name="contraseña"
            placeholder="Mínimo 6 caracteres" minlength="6" required />
        </div>

        <button type="submit" class="btn-submit">Crear cuenta</button>
      </form>
      <div th:if="${error}" class="alert alert-danger mt-3">
        <p th:text="${error}" class="mb-0"></p>
      </div>
      <p class="login-link">
        ¿Ya tienes cuenta? <a href="/usuarios/login">Inicia sesión aquí</a>
      </p>

    </div>
  </div>

  <footer>
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <p class="footer-logo">Lib<span>rosa</span></p>
      <p class="footer-text">© 2026 Librosa — IF4101 Lenguajes para Aplicaciones Comerciales · UCR Sede del Caribe</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById('registerForm');

    form.addEventListener('submit', function () {
      form.classList.add('was-validated');
    });
  </script>

</body>

</html>
