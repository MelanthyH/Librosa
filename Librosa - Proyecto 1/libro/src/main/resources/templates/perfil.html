<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librosa — Mi Perfil</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --negro: #0a0a0a;
      --negro-suave: #111111;
      --rojo: #c0001a;
      --rojo-hover: #e8001f;
      --blanco: #f5f0eb;
      --gris: #888888;
      --borde: rgba(192, 0, 26, 0.2);
    }

    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }

    .navbar {
      background-color: rgba(10, 10, 10, 0.97);
      border-bottom: 1px solid var(--borde);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-style: italic;
      color: var(--blanco) !important;
    }

    .navbar-brand span {
      color: var(--rojo);
    }

    .nav-link {
      color: var(--gris) !important;
    }

    .nav-link:hover {
      color: var(--blanco) !important;
    }

    .nav-user span {
      color: var(--blanco);
    }

    .page-wrapper {
      padding: 3rem 0;
    }

    .breadcrumb-lib {
      color: var(--gris);
      margin-bottom: 2rem;
    }

    .breadcrumb-lib a {
      text-decoration: none;
      color: var(--gris);
    }

    .breadcrumb-lib a:hover {
      color: var(--blanco);
    }

    .page-title em {
      color: var(--rojo);
    }

    .form-card {
      background-color: var(--negro-suave);
      border: 1px solid var(--borde);
      padding: 2rem;
    }

    .form-control {
      background-color: var(--negro);
      color: var(--blanco);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .form-control:focus {
      background-color: var(--negro);
      color: var(--blanco);
      border-color: var(--rojo);
      box-shadow: none;
    }

    .form-control:disabled {
      background-color: rgba(10,10,10,0.6);
      color: var(--gris);
    }

    .modo-badge {
      border: 1px solid var(--borde);
      padding: 5px 15px;
      color: var(--gris);
    }

    .btn-primary-lib {
      background-color: var(--rojo);
      color: white;
      border: none;
      padding: 10px 20px;
    }

    .btn-primary-lib:hover {
      background-color: var(--rojo-hover);
    }

    .btn-secondary-lib {
      background: transparent;
      color: var(--gris);
      border: 1px solid var(--gris);
      padding: 10px 20px;
    }

    footer {
      border-top: 1px solid var(--borde);
      padding: 1.5rem;
      margin-top: 3rem;
    }

    .footer-logo span {
      color: var(--rojo);
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">Lib<span>rosa</span></a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-center gap-3">

        <li class="nav-item">
          <a class="nav-link" href="/mi-biblioteca">Mi Biblioteca</a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             th:href="@{/usuarios/perfil}"
             style="color: var(--blanco) !important;">
             Mi Perfil
          </a>
        </li>

        <li class="nav-item">
          <span class="nav-user">
            Hola, <span th:text="${session.usuario.nombre}"></span>
          </span>
        </li>

        <li class="nav-item">
          <a href="/usuarios/logout"
             class="nav-link"
             style="color: var(--rojo) !important;">
             Cerrar sesión
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="page-wrapper">
  <div class="container">

    <!-- Breadcrumb -->
    <div class="breadcrumb-lib">
      <a href="/mi-biblioteca">Mi Biblioteca</a>
      <span>›</span>
      <span>Mi Perfil</span>
    </div>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="page-title">
          Mi <em>perfil</em>
        </h1>
      </div>

      <span class="modo-badge" id="modoBadge">
        Solo lectura
      </span>
    </div>

    <!-- Form -->
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="form-card">

          <form th:action="@{/usuarios/actualizar}"
                method="post"
                id="perfilForm">

            <!-- Nombre -->
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text"
                     id="nombre"
                     name="nombre"
                     class="form-control"
                     th:value="${session.usuario.nombre}"
                     disabled />
            </div>

            <!-- Correo -->
            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input type="email"
                     id="email"
                     name="correo"
                     class="form-control"
                     th:value="${session.usuario.correo}"
                     disabled />
            </div>

            <!-- Contraseña -->
            <div class="mb-4">
              <label class="form-label">Nueva contraseña</label>
              <input type="password"
                     id="contraseña"
                     name="contraseña"
                     class="form-control"
                     placeholder="Nueva contraseña"
                     disabled />
            </div>

            <!-- Botones vista -->
            <div id="botonesVista">
              <button type="button"
                      class="btn-primary-lib"
                      onclick="activarEdicion()">
                Editar perfil
              </button>
            </div>

            <!-- Botones edición -->
            <div id="botonesEdicion" class="d-none">
              <button type="submit" class="btn-primary-lib">
                Guardar cambios
              </button>

              <button type="button"
                      class="btn-secondary-lib"
                      onclick="cancelarEdicion()">
                Cancelar
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container d-flex justify-content-between align-items-center">
    <p class="footer-logo">
      Lib<span>rosa</span>
    </p>

    <p>
      © 2026 Librosa — IF4101 Lenguajes para Aplicaciones Comerciales · UCR
    </p>
  </div>
</footer>

<script>
  const camposEditables = [
    'nombre',
    'email',
    'contraseña'
  ];

  function activarEdicion() {
    camposEditables.forEach(id => {
      document.getElementById(id).disabled = false;
    });

    document.getElementById("botonesVista").classList.add("d-none");
    document.getElementById("botonesEdicion").classList.remove("d-none");

    document.getElementById("modoBadge").textContent = "Modo edición";
  }

  function cancelarEdicion() {
    camposEditables.forEach(id => {
      document.getElementById(id).disabled = true;
    });

    document.getElementById("contraseña").value = "";

    document.getElementById("botonesVista").classList.remove("d-none");
    document.getElementById("botonesEdicion").classList.add("d-none");

    document.getElementById("modoBadge").textContent = "Solo lectura";
  }
</script>

</body>
</html>
