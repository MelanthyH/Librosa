<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Editar progreso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/mibiblioteca-editar.css}">
</head>

<body>

  <nav class="navbar navbar-dark px-3">
    <a class="navbar-brand" th:href="@{/mi-biblioteca}">← Volver</a>
  </nav>

  <div class="card-form">

    <h2>Editar progreso</h2>

    <div class="info-libro">
      <p><strong>Título:</strong> <span th:text="${registro.libro.titulo}"></span></p>
      <p><strong>Autor:</strong> <span th:text="${registro.libro.autor}"></span></p>
    </div>

    <form th:action="@{/mi-biblioteca/{id}/actualizar(id=${registro.id})}" method="post">

      <label>Estado</label>
      <select name="estado" class="form-control">
        <option value="PENDIENTE" th:selected="${registro.estado == 'PENDIENTE'}">Pendiente</option>
        <option value="LEYENDO" th:selected="${registro.estado == 'LEYENDO'}">Leyendo</option>
        <option value="LEIDO" th:selected="${registro.estado == 'LEIDO'}">Leído</option>
      </select>

      <label>Página actual</label>
      <input type="number" name="paginaActual" class="form-control" th:value="${registro.paginaActual}" min="0" />

      <label>Notas personales</label>
      <textarea name="notasResena" class="form-control" rows="4" th:text="${registro.notasResena}">
    </textarea>

      <button type="submit" class="btn btn-primary">
        Guardar cambios
      </button>

    </form>

  </div>

</body>

</html>
