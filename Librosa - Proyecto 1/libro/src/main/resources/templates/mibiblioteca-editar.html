<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar progreso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: #0a0a0a;
      color: #f5f0eb;
      font-family: Arial;
    }

    .card-form {
      background: #111;
      padding: 2rem;
      border-radius: 12px;
      max-width: 600px;
      margin: 3rem auto;
      border: 1px solid #333;
    }

    label { margin-top: 1rem; }
    .btn-primary {
      background: #c0001a;
      border: none;
      margin-top: 1.5rem;
      width: 100%;
    }

    .info-libro {
      padding: 0.8rem;
      background: #1a1a1a;
      border-radius: 8px;
      margin-bottom: 1rem;
      border: 1px solid #333;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark px-3">
  <a class="navbar-brand" th:href="@{/mi-biblioteca}">← Volver</a>
</nav>

<div class="card-form">

  <h2>Editar progreso</h2>

  <!-- INFO SOLO LECTURA (LIBRO NO SE EDITA) -->
  <div class="info-libro">
    <p><strong>Título:</strong> <span th:text="${registro.libro.titulo}"></span></p>
    <p><strong>Autor:</strong> <span th:text="${registro.libro.autor}"></span></p>
  </div>

  <!-- FORM SOLO PROGRESO -->
  <form th:action="@{/mi-biblioteca/{id}/actualizar(id=${registro.id})}"
        method="post">

    <!-- Estado (esto SÍ se edita) -->
    <label>Estado</label>
    <select name="estado" class="form-control">
      <option value="PENDIENTE" th:selected="${registro.estado == 'PENDIENTE'}">Pendiente</option>
      <option value="LEYENDO" th:selected="${registro.estado == 'LEYENDO'}">Leyendo</option>
      <option value="LEIDO" th:selected="${registro.estado == 'LEIDO'}">Leído</option>
    </select>

    <!-- Página actual -->
    <label>Página actual</label>
    <input type="number"
           name="paginaActual"
           class="form-control"
           th:value="${registro.paginaActual}"
           min="0"/>

    <!-- Notas personales -->
    <label>Notas personales</label>
    <textarea name="notasResena"
              class="form-control"
              rows="4"
              th:text="${registro.notasResena}">
    </textarea>

    <button type="submit" class="btn btn-primary">
      Guardar cambios
    </button>

  </form>

</div>

</body>
</html>
