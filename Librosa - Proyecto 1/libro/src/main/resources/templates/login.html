<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Librosa — Iniciar sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/login.css">
</head>

<body>
  <nav class="navbar sticky-top">
    <div class="container d-flex align-items-center">
      <a class="navbar-brand" href="/">
        <img th:src="@{/img/logo_sin_fondo.png}" alt="Librosa" style="height:45px; width:auto; margin-right:0.5rem;" />
        Lib<span>rosa</span>
      </a>
      <a href="/" style="font-family:'Cinzel',serif; font-size:0.65rem;
                       color:var(--gris); text-decoration:none; margin-left:auto;
                       letter-spacing:0.1em;">
        ← Volver al inicio
      </a>
    </div>
  </nav>

  <main>
    <div class="login-card">

      <p class="login-card-label">Bienvenido de nuevo</p>
      <h1 class="login-title">Iniciar <em>sesión</em></h1>
      <p class="login-subtitle">Accede a tu biblioteca personal.</p>

      <div class="alert alert-danger" th:if="${error}">
        <p th:text="${error}"></p>
      </div>

      <div class="alert alert-success" th:if="${mensaje}">
        <p th:text="${mensaje}"></p>
      </div>

      <form action="/usuarios/autenticar" method="post">

        <div class="mb-3">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input type="email" id="correo" name="correo" class="form-control" placeholder="tucorreo@ejemplo.com"
            required />
        </div>

        <div class="mb-3">
          <label for="contraseña" class="form-label">Contraseña</label>
          <input type="password" id="contraseña" name="contraseña" class="form-control" placeholder="••••••••"
            required />
        </div>

        <button type="submit" class="btn-primary-lib">
          Entrar
        </button>

      </form>

      <p class="login-footer-text">
        ¿No tienes cuenta? <a href="/usuarios/registro">Regístrate aquí</a>
      </p>

    </div>
  </main>

  <footer>
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <p class="footer-logo">Lib<span>rosa</span></p>
      <p class="footer-text">© 2026 Librosa — IF4101 Lenguajes para Aplicaciones Comerciales · UCR Sede del Caribe</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
