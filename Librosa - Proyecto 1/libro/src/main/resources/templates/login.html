<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librosa — Iniciar sesión</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --negro: #0a0a0a;
      --negro-suave: #111111;
      --rojo: #c0001a;
      --rojo-hover: #e8001f;
      --blanco: #f5f0eb;
      --gris: #888888;
      --borde: rgba(192, 0, 26, 0.2);
    }

    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      background-color: rgba(10, 10, 10, 0.97);
      border-bottom: 1px solid var(--borde);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-style: italic;
      color: var(--blanco) !important;
    }

    .navbar-brand span { color: var(--rojo); }

    /* ── CONTENIDO PRINCIPAL ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
      background: radial-gradient(ellipse 60% 60% at 50% 40%, rgba(192,0,26,0.06) 0%, transparent 70%), var(--negro);
    }

    /* ── CARD DEL FORMULARIO ── */
    .login-card {
      background-color: var(--negro-suave);
      border: 1px solid var(--borde);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .login-card-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rojo);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .login-card-label::before {
      content: '';
      width: 30px;
      height: 1px;
      background: var(--rojo);
    }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }

    .login-title em {
      font-style: italic;
      color: var(--rojo);
    }

    .login-subtitle {
      font-size: 0.88rem;
      color: var(--gris);
      margin-bottom: 2.2rem;
    }

    /* ── CAMPOS ── */
    .form-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 0.4rem;
    }

    .form-control {
      background-color: var(--negro);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--blanco);
      border-radius: 0;
      padding: 0.75rem 1rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.3s;
    }

    .form-control:focus {
      background-color: var(--negro);
      border-color: var(--rojo);
      color: var(--blanco);
      box-shadow: none;
      outline: none;
    }

    .form-control::placeholder {
      color: rgba(136,136,136,0.4);
    }

    /* ── BOTÓN SUBMIT ── */
    .btn-primary-lib {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blanco);
      background-color: var(--rojo);
      border: none;
      padding: 0.9rem 2.2rem;
      width: 100%;
      cursor: pointer;
      transition: background-color 0.3s;
      border-radius: 0;
      margin-top: 0.5rem;
    }

    .btn-primary-lib:hover {
      background-color: var(--rojo-hover);
      color: var(--blanco);
    }

    /* ── LINK REGISTRO ── */
    .login-footer-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--gris);
      margin-top: 1.8rem;
    }

    .login-footer-text a {
      color: var(--rojo);
      text-decoration: none;
      transition: color 0.3s;
    }

    .login-footer-text a:hover {
      color: var(--rojo-hover);
    }

    /* ── ALERTA DE ERROR ── */
    .alert-error {
      background-color: rgba(192,0,26,0.1);
      border: 1px solid var(--rojo);
      color: var(--blanco);
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      display: none; /* se muestra con JS o Thymeleaf */
    }

    /* ── FOOTER ── */
    footer {
      background-color: var(--negro);
      border-top: 1px solid var(--borde);
      padding: 1.5rem 2rem;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--gris);
      margin: 0;
    }

    .footer-logo span { color: var(--rojo); }

    .footer-text {
      font-size: 0.75rem;
      color: rgba(136,136,136,0.5);
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="/">
        Lib<span>rosa</span>
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="login-card">

      <p class="login-card-label">Bienvenido de nuevo</p>
      <h1 class="login-title">Iniciar <em>sesión</em></h1>
      <p class="login-subtitle">Accede a tu biblioteca personal.</p>

      <!-- ERROR (CORREGIDO) -->
      <div class="alert alert-danger"
           th:if="${error}">
        <p th:text="${error}"></p>
      </div>

      <!-- MENSAJE (REGISTRO EXITOSO) -->
      <div class="alert alert-success"
           th:if="${mensaje}">
        <p th:text="${mensaje}"></p>
      </div>

      <!-- FORMULARIO -->
      <form action="/usuarios/autenticar" method="post">

        <div class="mb-3">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input
            type="email"
            id="correo"
            name="correo"
            class="form-control"
            placeholder="tucorreo@ejemplo.com"
            required
          />
        </div>

        <div class="mb-3">
          <label for="contraseña" class="form-label">Contraseña</label>
          <input
            type="password"
            id="contraseña"
            name="contraseña"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="btn-primary-lib">
          Entrar
        </button>

      </form>

      <p class="login-footer-text">
        ¿No tienes cuenta? <a href="/usuarios/registro">Regístrate aquí</a>
      </p>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <p class="footer-logo">Lib<span>rosa</span></p>
      <p class="footer-text">© 2026 Librosa — IF4101 Lenguajes para Aplicaciones Comerciales · UCR Sede del Caribe</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
