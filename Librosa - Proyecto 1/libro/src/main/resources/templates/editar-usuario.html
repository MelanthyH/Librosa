<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librosa — Usuario</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Cinzel&family=Lato&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --negro: #0a0a0a;
      --negro-suave: #111111;
      --rojo: #c0001a;
      --rojo-hover: #e8001f;
      --blanco: #f5f0eb;
      --gris: #888888;
      --borde: rgba(192, 0, 26, 0.2);
    }

    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: 'Lato', sans-serif;
    }

    .navbar {
      background-color: rgba(10, 10, 10, 0.97);
      border-bottom: 1px solid var(--borde);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      color: var(--blanco) !important;
    }

    .navbar-brand span { color: var(--rojo); }

    .page-wrapper {
      padding: 3rem 0;
    }

    .form-card {
      background-color: var(--negro-suave);
      border: 1px solid var(--borde);
      padding: 2rem;
    }

    .form-control, .form-select {
      background-color: var(--negro);
      color: var(--blanco);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--rojo);
      box-shadow: none;
    }

    .btn-primary-lib {
      background-color: var(--rojo);
      color: white;
      border: none;
      padding: 10px 20px;
    }

    .btn-primary-lib:hover {
      background-color: var(--rojo-hover);
    }

    .btn-secondary-lib {
      background: transparent;
      color: var(--gris);
      border: 1px solid var(--gris);
      padding: 10px 20px;
    }

    footer {
      border-top: 1px solid var(--borde);
      padding: 1.5rem;
      margin-top: 3rem;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="/admin/dashboard">
      Lib<span>rosa</span>
    </a>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="page-wrapper">
  <div class="container">

    <!-- TITULO DINÁMICO -->
    <h1>
      <span th:if="${usuario.id == 0}">
        Crear <em style="color: var(--rojo);">usuario</em>
      </span>
      <span th:if="${usuario.id != 0}">
        Editar <em style="color: var(--rojo);">usuario</em>
      </span>
    </h1>

    <div class="row justify-content-center mt-4">
      <div class="col-lg-6">

        <div class="form-card">

          <form th:action="@{/usuarios/guardar}"
                th:object="${usuario}"
                method="post">

            <!-- ID oculto -->
            <input type="hidden" th:field="*{id}">

            <!-- Nombre -->
            <div class="mb-3">
              <label>Nombre</label>
              <input type="text"
                     th:field="*{nombre}"
                     class="form-control"
                     required>
            </div>

            <!-- Correo -->
            <div class="mb-3">
              <label>Correo</label>
              <input type="email"
                     th:field="*{correo}"
                     class="form-control"
                     required>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
              <label>Contraseña</label>
              <input type="password"
                     th:field="*{contraseña}"
                     class="form-control"
                     placeholder="Nueva contraseña (opcional)">
            </div>

            <!-- Tipo usuario -->
            <div class="mb-4">
              <label>Tipo de usuario</label>
              <select th:field="*{tipoUsuario}" class="form-select">
                <option value="usuario">Usuario</option>
                <option value="admin">Administrador</option>
              </select>
            </div>

            <!-- BOTONES -->
            <div class="d-flex gap-3">
              <button type="submit" class="btn-primary-lib">
                <span th:if="${usuario.id == 0}">Crear</span>
                <span th:if="${usuario.id != 0}">Guardar</span>
              </button>

              <a href="/admin/dashboard" class="btn-secondary-lib">
                Cancelar
              </a>
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container text-center">
    <p>© 2026 Librosa</p>
  </div>
</footer>

</body>
</html>
