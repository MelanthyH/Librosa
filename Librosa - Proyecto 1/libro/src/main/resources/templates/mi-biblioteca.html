<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librosa — Mi Biblioteca</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --negro: #0a0a0a;
      --negro-suave: #111111;
      --rojo: #c0001a;
      --rojo-hover: #e8001f;
      --blanco: #f5f0eb;
      --gris: #888888;
      --borde: rgba(192, 0, 26, 0.2);
    }

    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
    }

    .navbar {
      background-color: rgba(10, 10, 10, 0.97);
      border-bottom: 1px solid var(--borde);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-style: italic;
      color: var(--blanco) !important;
    }

    .navbar-brand span {
      color: var(--rojo);
    }

    .nav-link {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gris) !important;
    }

    .btn-nav-outline {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gris);
      background: transparent;
      border: 1px solid rgba(136,136,136,0.3);
      padding: 0.45rem 1.2rem;
      text-decoration: none;
    }

    .page-header {
      padding: 3.5rem 0 2rem;
      border-bottom: 1px solid var(--borde);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 300;
    }

    .page-title em {
      color: var(--rojo);
    }

    .filtros {
      padding: 1.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-agregar {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blanco);
      background-color: var(--rojo);
      border: none;
      padding: 0.55rem 1.4rem;
      cursor: pointer;
    }

    .biblioteca {
      padding: 2rem 0 5rem;
    }

    .book-card {
      background-color: var(--negro-suave);
      border: 1px solid rgba(255,255,255,0.05);
      height: 100%;
    }

    .book-cover-placeholder {
      width: 100%;
      height: 200px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .book-body {
      padding: 1.3rem;
    }

    .estado-badge {
      font-size: 0.7rem;
      padding: 5px 10px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .estado-leido { background: green; }
    .estado-leyendo { background: orange; }
    .estado-pendiente { background: gray; }

    .book-title { font-size: 1.2rem; }
    .book-author { color: var(--gris); }

    .book-actions {
      padding: 1rem;
      display: flex;
      gap: 10px;
    }

    .btn-accion {
      text-decoration: none;
      color: white;
      border: 1px solid white;
      padding: 5px 10px;
      flex: 1;
      text-align: center;
      background: transparent;
      cursor: pointer;
    }

    .danger {
      border-color: red;
      color: red;
    }

    .empty-state {
      text-align: center;
      padding: 4rem;
    }

    footer {
      border-top: 1px solid var(--borde);
      padding: 2rem;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">
      Lib<span>rosa</span>
    </a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-3">

        <li class="nav-item">
          <a class="nav-link" th:href="@{/mi-biblioteca}">
            Mi Biblioteca
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             th:href="@{/usuarios/{id}/perfil(id=${session.usuario.id})}">
            Mi Perfil
          </a>
        </li>

        <li class="nav-item">
          <a th:href="@{/usuarios/login}" class="btn-nav-outline">
            Cerrar sesión
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <div class="container">
    <h1 class="page-title">Mi <em>Biblioteca</em></h1>
  </div>
</div>

<!-- BOTÓN AGREGAR -->
<div class="container">
  <div class="filtros">

    <div></div>

    <a th:href="@{/biblioteca-general}" style="text-decoration:none;">
  <button type="button" class="btn-agregar">
    + Agregar libro
  </button>
</a>

  </div>
</div>

<!-- LIBROS -->
<section class="biblioteca">
  <div class="container">

    <div class="row g-4" th:if="${not #lists.isEmpty(todos)}">

      <div class="col-md-4 col-lg-3"
           th:each="registro : ${todos}">

        <div class="book-card">

          <div class="book-cover-placeholder">📖</div>

          <div class="book-body">

            <span class="estado-badge"
                  th:classappend="
                  ${registro.estado == 'leído'} ? ' estado-leido' :
                  (${registro.estado == 'leyendo'} ? ' estado-leyendo' :
                  ' estado-pendiente')"
                  th:text="${registro.estado}">
            </span>

            <h3 class="book-title"
                th:text="${registro.libro.titulo}">
            </h3>

            <p class="book-author"
               th:text="${registro.libro.autor}">
            </p>

            <p th:text="${registro.libro.categoria.nombreCategoria}">
            </p>

            <p>
              Página actual:
              <span th:text="${registro.paginaActual}"></span>
            </p>

          </div>

          <div class="book-actions">

            <!-- EDITAR -->
            <form th:action="@{/mi-biblioteca/{id}/editar(id=${registro.id})}"
                  method="get"
                  style="flex:1;">

              <button type="submit" class="btn-accion">
                Editar
              </button>
            </form>

            <!-- ELIMINAR -->
            <form th:action="@{/mi-biblioteca/{id}/eliminar(id=${registro.id})}"
                  method="post"
                  style="flex:1;">

              <button type="submit" class="btn-accion danger">
                Eliminar
              </button>
            </form>

          </div>

        </div>
      </div>

    </div>

    <div class="empty-state"
         th:if="${#lists.isEmpty(todos)}">

      <h3>Tu biblioteca está vacía</h3>
      <p>Agrega tu primer libro para comenzar</p>

      <a th:href="@{/biblioteca-general}" style="text-decoration:none;">
  <button type="button" class="btn-agregar">
    + Agregar libro
  </button>
</a>

    </div>

  </div>
</section>

<footer>
  <div class="container text-center">
    <p>Librosa © 2026</p>
  </div>
</footer>

</body>
